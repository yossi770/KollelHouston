name: Supabase Keep Alive

on:
  schedule:
    # מריץ את הסקריפט כל יומיים (בשעה 00:00)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # מאפשר להריץ ידנית לבדיקה

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Profiles Table
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
